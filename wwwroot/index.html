<!DOCTYPE html>
<html>
<head>
    <title>TerraMorph Crystal Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1> TerraMorph: Natural Crystal Analyzer</h1>

<div class="container">

    <div class="card">
        <h3> Water Displacement</h3>
        <input id="initial" type="number" placeholder="Initial Volume (mL)">
        <input id="final" type="number" placeholder="Final Volume (mL)">
    </div>

    <div class="card">
        <h3>⚖️ Mass</h3>
        <input id="mass" type="number" placeholder="Mass (g)">
    </div>

    <div class="card">
        <h3> Trigonometry</h3>
        <input id="distance" type="number" placeholder="Distance (cm)">
        <input id="angle" type="number" placeholder="Angle (degrees)">
    </div>

</div>

<button onclick="calculate()">Calculate</button>

<div id="results"></div>

<canvas id="chart"></canvas>

<script src="script.js"></script>

</body>
</html>
